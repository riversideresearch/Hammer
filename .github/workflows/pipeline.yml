name: Pipeline

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CFLAGS: "-std=c99 -pedantic -Wall -Wstrict-prototypes -Wwrite-strings -Wpointer-arith -Wcast-align -Werror"

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src examples -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python and SCons files
        run: |
          ruff check $(find . -path ./build -prune -o \( -name "*.py" -o -name "SConstruct" -o -name "SConscript" \) -print)

  scons-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons gcc libglib2.0-dev pkg-config swig default-jdk libgtest-dev python3-setuptools

      - name: Run tests
        run: scons test

      - name: Run binding tests
        run: scons bindings=all test

  build-deb:
    runs-on: ubuntu-latest
    needs: [clang-format, ruff, scons-test]
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts scons libglib2.0-dev pkg-config

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Find and rename generated .deb
        id: deb
        run: |
          DEB_FILE=$(ls ../libhammer_*.deb)
          VERSION=$(cat VERSION)
          NEW_NAME="libhammer_${VERSION}_amd64.deb"
          mv $DEB_FILE $NEW_NAME
          echo "deb_file=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libhammer-deb
          path: ${{ steps.deb.outputs.deb_file }}
